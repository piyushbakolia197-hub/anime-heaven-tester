<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPL Advanced Score Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>IPL Advanced Score Card</h1>
        <p>Use this form to build a realistic IPL match summary with team details, extras, and match metadata.</p>
      </header>

      <main class="form-card">
        <section class="section-panel">
          <h2>Match Information</h2>
          <div class="grid-2">
            <label>
              Match Title
              <input id="match-title" type="text" value="" />
            </label>
            <label>
              Venue
              <input id="match-venue" type="text" value="" />
            </label>
            <label>
              Series
              <input id="match-series" type="text" value="" />
            </label>
            <label>
              Match Date
              <input id="match-date" type="date" value="" />
            </label>
          </div>
        </section>

        <section class="section-panel">
          <h2>Team 1 Details</h2>
          <div class="grid-2">
            <label>
              Team Name
              <input id="team1-name" type="text" value="" />
            </label>
            <label>
              Runs
              <input id="team1-runs" type="number" min="0" value="" />
            </label>
            <label>
              Wickets
              <input id="team1-wickets" type="number" min="0" max="10" value="" />
            </label>
            <label>
              Overs
              <input id="team1-overs" type="text" value="" />
            </label>
            <label>
              Extras
              <input id="team1-extras" type="number" min="0" value="" />
            </label>
            <label>
              Powerplay Score
              <input id="team1-powerplay" type="text" value="" />
            </label>
          </div>
        </section>

        <section class="section-panel">
          <h2>Team 2 Details</h2>
          <div class="grid-2">
            <label>
              Team Name
              <input id="team2-name" type="text" value="" />
            </label>
            <label>
              Runs
              <input id="team2-runs" type="number" min="0" value="" />
            </label>
            <label>
              Wickets
              <input id="team2-wickets" type="number" min="0" max="10" value="" />
            </label>
            <label>
              Overs
              <input id="team2-overs" type="text" value="" />
            </label>
            <label>
              Extras
              <input id="team2-extras" type="number" min="0" value="" />
            </label>
            <label>
              Powerplay Score
              <input id="team2-powerplay" type="text" value="" />
            </label>
          </div>
        </section>

        <div class="actions">
          <button id="calculate-btn" type="button">Calculate Scores</button>
          <button id="reset-btn" type="button" class="secondary">Reset Form</button>
        </div>

        <section class="section-panel result-panel" id="result"></section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
